name: Reindex Repo

on:
  repository_dispatch:
    types: [reindex]
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated repo paths to process (for example: alpine/v3.23/main/riscv64)'
        required: false
        type: string
        default: ''
      force_reindex:
        description: 'Ignore dirty-marker selection and process only the explicit targets'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: reindex-global

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ vars.R2_BUCKET || secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || vars.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || vars.R2_SECRET_ACCESS_KEY }}
      APK_REPO_SIGNING_KEY: ${{ secrets.APK_REPO_SIGNING_KEY }}
      APK_REPO_SIGNING_KEY_PUBLIC_NAME: ${{ vars.APK_REPO_SIGNING_KEY_PUBLIC_NAME || secrets.APK_REPO_SIGNING_KEY_PUBLIC_NAME }}
      SIGN_REPO_INDEX: ${{ vars.SIGN_REPO_INDEX || '1' }}
      TRUSTED_APK_KEYS_DIR: ${{ vars.TRUSTED_APK_KEYS_DIR || 'trusted/apk-keys' }}
      AWS_REGION: auto
      REPO_PREFIX: ${{ vars.REPO_PREFIX }}
      STATE_PREFIX: ${{ vars.STATE_PREFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          [[ -n "${R2_ACCOUNT_ID}" ]] || { echo "R2_ACCOUNT_ID is required"; exit 1; }
          [[ -n "${R2_BUCKET}" ]] || { echo "R2_BUCKET is required"; exit 1; }
          [[ -n "${AWS_ACCESS_KEY_ID}" ]] || { echo "R2_ACCESS_KEY_ID is required"; exit 1; }
          [[ -n "${AWS_SECRET_ACCESS_KEY}" ]] || { echo "R2_SECRET_ACCESS_KEY is required"; exit 1; }
          if [[ "${SIGN_REPO_INDEX}" == "1" ]]; then
            [[ -n "${APK_REPO_SIGNING_KEY}" ]] || { echo "APK_REPO_SIGNING_KEY secret is required when SIGN_REPO_INDEX=1"; exit 1; }
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r scripts/requirements.txt

      - name: Prepare repository signing key
        if: env.SIGN_REPO_INDEX == '1'
        run: |
          set -euo pipefail
          key_out="${RUNNER_TEMP}/apk-repo-signing.rsa"
          printf '%s' "${APK_REPO_SIGNING_KEY}" > "${key_out}"
          chmod 600 "${key_out}"
          echo "APK_REPO_SIGNING_KEY_PATH=${key_out}" >> "${GITHUB_ENV}"

      - name: Reindex dirty paths
        env:
          DISPATCH_TARGETS: ${{ github.event.inputs.targets || '' }}
          DISPATCH_FORCE_REINDEX: ${{ github.event.inputs.force_reindex || 'false' }}
        run: |
          set -euo pipefail
          extra_args=()
          dispatch_targets="${DISPATCH_TARGETS:-}"
          dispatch_force="${DISPATCH_FORCE_REINDEX:-false}"

          if [[ -n "${dispatch_targets}" ]]; then
            extra_args+=(--targets "${dispatch_targets}")
          fi
          if [[ "${dispatch_force}" == "true" ]]; then
            if [[ -z "${dispatch_targets}" ]]; then
              echo "workflow_dispatch input 'targets' is required when force_reindex=true"
              exit 1
            fi
            extra_args+=(--explicit-only)
          fi

          if [[ -n "${TRUSTED_APK_KEYS_DIR}" && -d "${TRUSTED_APK_KEYS_DIR}" ]]; then
            extra_args+=(--trusted-keys-dir "${TRUSTED_APK_KEYS_DIR}")
          fi
          if [[ "${SIGN_REPO_INDEX}" == "1" ]]; then
            extra_args+=(--signing-key-file "${APK_REPO_SIGNING_KEY_PATH}")
            if [[ -n "${APK_REPO_SIGNING_KEY_PUBLIC_NAME}" ]]; then
              extra_args+=(--signing-key-public-name "${APK_REPO_SIGNING_KEY_PUBLIC_NAME}")
            fi
          fi
          python3 scripts/reindex_dirty.py \
            --bucket "${R2_BUCKET}" \
            --account-id "${R2_ACCOUNT_ID}" \
            --repo-prefix "${REPO_PREFIX:-alpine/}" \
            --state-prefix "${STATE_PREFIX:-_state/dirty/}" \
            --event-json "${GITHUB_EVENT_PATH}" \
            "${extra_args[@]}"

      - name: Cleanup repository signing key
        if: always() && env.SIGN_REPO_INDEX == '1'
        run: |
          set -euo pipefail
          rm -f "${APK_REPO_SIGNING_KEY_PATH:-}"
